<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social Media Tags Registry - AP MedTech Zone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --navy: #0f172a;
      --slate: #cbd5e1;
      --glass-bg: rgba(255, 255, 255, 0.1);
    }
    body {
      background-color: var(--navy);
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 1rem;
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    table.table-hover tbody tr:hover {
      background-color: rgba(255,255,255,0.1) !important;
    }
    .offcanvas {
      background-color: var(--navy);
      color: white;
    }
    .modal-content {
      background-color: var(--navy);
      color: white;
    }
    .btn-check:checked + .btn-outline-light {
      background-color: #4f46e5;
      border-color: #4f46e5;
    }
    .tag-link {
      color: #60a5fa;
      text-decoration: none;
    }
    .tag-link:hover {
      text-decoration: underline;
    }
    .copy-icon {
      cursor: pointer;
      transition: color 0.2s;
    }
    .copy-icon:hover {
      color: #60a5fa;
    }
    .copy-check {
      color: #10b981;
    }
    .stealth-link {
      color: inherit;
      text-decoration: none;
    }
    .stealth-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="fade-in">

<!-- Navbar -->
<nav class="navbar sticky-top navbar-dark bg-dark px-3">
  <div class="container-fluid">
    <span class="navbar-brand">AP MedTech Zone - Social Media Tags Registry</span>
    <div class="dropdown">
      <button class="btn btn-sm btn-outline-light dropdown-toggle" type="button" id="actionsDropdown" data-bs-toggle="dropdown">
        Actions
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="#" id="loginBtn">Login</a></li>
        <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#suggestModal">Suggest New Entry</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid mt-3">
  <div class="row">
    <!-- Sidebar (Desktop) -->
    <div class="col-md-3 d-none d-md-block">
      <div class="glass mb-3 p-3">
        <label for="listSelect" class="form-label">Select List</label>
        <select id="listSelect" class="form-select mb-3"></select>

        <label for="categoryFilter" class="form-label">Filter by Category</label>
        <select id="categoryFilter" class="form-select mb-3"></select>

        <label for="searchInput" class="form-label">Search (comma-separated)</label>
        <input type="text" id="searchInput" class="form-control mb-3" placeholder="e.g., icmr, kiht"/>

        <button id="resetFilters" class="btn btn-sm btn-outline-light w-100">Reset Filters</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="col-md-9">
      <div class="glass">
        <div class="table-responsive">
          <table class="table table-dark table-hover">
            <thead>
              <tr>
                <th>Organization</th>
                <th>
                  Twitter <i class="fas fa-copy copy-icon" data-col="twitter"></i>
                </th>
                <th>
                  LinkedIn <i class="fas fa-copy copy-icon" data-col="linkedin"></i>
                </th>
                <th>
                  Facebook <i class="fas fa-copy copy-icon" data-col="facebook"></i>
                </th>
                <th>
                  Instagram <i class="fas fa-copy copy-icon" data-col="instagram"></i>
                </th>
              </tr>
            </thead>
            <tbody id="dataTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Offcanvas (Mobile) -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Filters</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <label for="mobileListSelect" class="form-label">Select List</label>
    <select id="mobileListSelect" class="form-select mb-3"></select>

    <label for="mobileCategoryFilter" class="form-label">Filter by Category</label>
    <select id="mobileCategoryFilter" class="form-select mb-3"></select>

    <label for="mobileSearchInput" class="form-label">Search (comma-separated)</label>
    <input type="text" id="mobileSearchInput" class="form-control mb-3" placeholder="e.g., icmr, kiht"/>

    <button id="mobileResetFilters" class="btn btn-sm btn-outline-light w-100">Reset Filters</button>
  </div>
</div>

<!-- Suggest Modal -->
<div class="modal fade" id="suggestModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Suggest New Entry</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <ul class="nav nav-tabs mb-3" id="suggestTabs">
          <li class="nav-item"><a class="nav-link active" href="#singleEntry" data-bs-toggle="tab">Single Entry</a></li>
          <li class="nav-item"><a class="nav-link" href="#bulkEntry" data-bs-toggle="tab">Bulk Upload</a></li>
        </ul>
        <div class="tab-content">
          <!-- Single Entry Form -->
          <div class="tab-pane fade show active" id="singleEntry">
            <form id="suggestForm">
              <div class="mb-3">
                <label class="form-label">Organization Name *</label>
                <input type="text" class="form-control" name="orgName" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Category *</label>
                <input type="text" class="form-control" name="category" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Twitter Handle</label>
                <input type="text" class="form-control" name="twitter" />
              </div>
              <div class="mb-3">
                <label class="form-label">LinkedIn Profile</label>
                <input type="url" class="form-control" name="linkedin" />
              </div>
              <div class="mb-3">
                <label class="form-label">Facebook Tag</label>
                <input type="text" class="form-control" name="facebook" />
              </div>
              <div class="mb-3">
                <label class="form-label">Instagram Handle</label>
                <input type="text" class="form-control" name="instagram" />
              </div>
              <button type="submit" class="btn btn-primary">Submit</button>
            </form>
          </div>

          <!-- Bulk Entry Grid -->
          <div class="tab-pane fade" id="bulkEntry">
            <p>Paste Excel rows below (Organization, Category, Twitter, LinkedIn, Facebook, Instagram)</p>
            <textarea id="bulkInput" class="form-control" rows="10" placeholder="Paste Excel rows here..."></textarea>
            <button id="bulkSubmit" class="btn btn-primary mt-2">Submit Bulk</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Admin Login</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required />
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Data Structures
let masterInventory = JSON.parse(localStorage.getItem('masterInventory')) || {};
let lists = JSON.parse(localStorage.getItem('lists')) || {
  'Master List': Object.keys(masterInventory),
  'Partners': []
};
let categories = JSON.parse(localStorage.getItem('categories')) || ['Health', 'Tech'];
let pendingSuggestions = JSON.parse(localStorage.getItem('pendingSuggestions')) || [];

// DOM Elements
const listSelect = document.getElementById('listSelect');
const mobileListSelect = document.getElementById('mobileListSelect');
const categoryFilter = document.getElementById('categoryFilter');
const mobileCategoryFilter = document.getElementById('mobileCategoryFilter');
const searchInput = document.getElementById('searchInput');
const mobileSearchInput = document.getElementById('mobileSearchInput');
const dataTableBody = document.getElementById('dataTableBody');
const copyIcons = document.querySelectorAll('.copy-icon');

// Initialize UI
function initUI() {
  populateDropdowns();
  renderTable();
}

// Populate Dropdowns
function populateDropdowns() {
  listSelect.innerHTML = '';
  mobileListSelect.innerHTML = '';
  categoryFilter.innerHTML = '<option value="">All Categories</option>';
  mobileCategoryFilter.innerHTML = '<option value="">All Categories</option>';

  Object.keys(lists).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    listSelect.appendChild(opt.cloneNode(true));
    mobileListSelect.appendChild(opt.cloneNode(true));
  });

  categories.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    categoryFilter.appendChild(opt.cloneNode(true));
    mobileCategoryFilter.appendChild(opt.cloneNode(true));
  });
}

// Render Table Based on Filters
function renderTable() {
  const selectedList = listSelect.value || mobileListSelect.value || 'Master List';
  const selectedCategory = categoryFilter.value || mobileCategoryFilter.value;
  const searchTerms = (searchInput.value || mobileSearchInput.value).split(',').map(s => s.trim().toLowerCase());

  const ids = lists[selectedList] || [];
  const records = ids.map(id => masterInventory[id]).filter(Boolean);

  const filtered = records.filter(rec => {
    const matchesCategory = !selectedCategory || rec.category === selectedCategory;
    const matchesSearch = !searchTerms[0] || searchTerms.some(term =>
      rec.orgName.toLowerCase().includes(term) ||
      rec.twitter?.toLowerCase().includes(term) ||
      rec.linkedin?.toLowerCase().includes(term) ||
      rec.facebook?.toLowerCase().includes(term) ||
      rec.instagram?.toLowerCase().includes(term)
    );
    return matchesCategory && matchesSearch;
  });

  dataTableBody.innerHTML = '';
  filtered.forEach(rec => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${rec.orgName}</td>
      <td><a href="https://x.com/${rec.twitter}" target="_blank" class="stealth-link">@${rec.twitter}</a></td>
      <td><a href="${rec.linkedin}" target="_blank" class="stealth-link">${rec.linkedin ? '🔗 Profile' : ''}</a></td>
      <td><a href="https://facebook.com/${rec.facebook}" target="_blank" class="stealth-link">@${rec.facebook}</a></td>
      <td><a href="https://instagram.com/${rec.instagram}" target="_blank" class="stealth-link">@${rec.instagram}</a></td>
    `;
    dataTableBody.appendChild(row);
  });
}

// Copy Column to Clipboard
copyIcons.forEach(icon => {
  icon.addEventListener('click', () => {
    const col = icon.dataset.col;
    const rows = Array.from(dataTableBody.rows);
    const values = rows.map(row => {
      const cell = row.cells[Object.keys(masterInventory)[0] ? row.rowIndex : 0];
      const link = cell.querySelector('a');
      return link ? link.textContent.replace('@', '') : '';
    }).filter(Boolean);

    navigator.clipboard.writeText(values.join('\n')).then(() => {
      icon.classList.remove('fa-copy');
      icon.classList.add('fa-check', 'copy-check');
      setTimeout(() => {
        icon.classList.remove('fa-check', 'copy-check');
        icon.classList.add('fa-copy');
      }, 1000);
    });
  });
});

// Suggest Form Submission
document.getElementById('suggestForm').addEventListener('submit', e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = {};
  for (let [key, value] of fd.entries()) {
    data[key] = value.trim();
  }

  pendingSuggestions.push(data);
  localStorage.setItem('pendingSuggestions', JSON.stringify(pendingSuggestions));
  alert('Suggestion submitted! Awaiting approval.');
  e.target.reset();
  bootstrap.Modal.getInstance(document.getElementById('suggestModal')).hide();
});

// Bulk Submit
document.getElementById('bulkSubmit').addEventListener('click', () => {
  const lines = document.getElementById('bulkInput').value.trim().split('\n');
  lines.forEach(line => {
    const parts = line.split('\t').map(p => p.trim());
    if (parts.length >= 2) {
      const [orgName, category, twitter='', linkedin='', facebook='', instagram=''] = parts;
      pendingSuggestions.push({ orgName, category, twitter, linkedin, facebook, instagram });
    }
  });
  localStorage.setItem('pendingSuggestions', JSON.stringify(pendingSuggestions));
  alert('Bulk entries submitted! Awaiting approval.');
  document.getElementById('bulkInput').value = '';
});

// Login Form Submission
document.getElementById('loginForm').addEventListener('submit', e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const { username, password } = Object.fromEntries(fd.entries());
  if (username === 'admin' && password === 'admin123') {
    alert('Login successful!');
    bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
  } else {
    alert('Invalid credentials!');
  }
});

// Reset Filters
document.getElementById('resetFilters').addEventListener('click', () => {
  listSelect.value = 'Master List';
  categoryFilter.value = '';
  searchInput.value = '';
  renderTable();
});
document.getElementById('mobileResetFilters').addEventListener('click', () => {
  mobileListSelect.value = 'Master List';
  mobileCategoryFilter.value = '';
  mobileSearchInput.value = '';
  renderTable();
});

// Event Listeners
[listSelect, mobileListSelect, categoryFilter, mobileCategoryFilter, searchInput, mobileSearchInput].forEach(el =>
  el.addEventListener('change', renderTable)
);

// Initial Load
initUI();
</script>

</body>
</html>
